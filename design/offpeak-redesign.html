<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>offpeak — redesign</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: #f3f1ed;
  color: #1c1917;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d4cfc7; border-radius: 3px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fadeUp 0.22s ease-out; }

/* ── Layout ─────────────────────────────── */
.main-wrap { max-width: 1080px; margin: 0 auto; padding: 32px 16px 100px; }

/* ── Nav ─────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 40;
  background: rgba(243,241,237,0.95); backdrop-filter: blur(14px);
  border-bottom: 2px solid #0d9488;       /* teal brand line */
}
.nav-inner { max-width: 1080px; margin: 0 auto; padding: 0 16px; }
.nav-row1 { height: 52px; display: flex; align-items: center; gap: 10px; }
.nav-tagline { font-size: 11px; color: #a8a29e; white-space: nowrap; }
.nav-years { display: flex; align-items: center; gap: 4px; margin-left: auto; }
.nav-row2 { display: none; }
@media (max-width: 640px) {
  .nav-years { display: none; }
  .nav-tagline { display: none; }
  .nav-row2 { height: 40px; display: flex; align-items: center; gap: 4px; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; border-top: 1px solid #ede9e3; }
  .nav-row2::-webkit-scrollbar { display: none; }
}

/* ── City dropdown ───────────────────────── */
.city-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px solid #e2ded7; border-radius: 10px;
  padding: 5px 10px 5px 12px; font-family: inherit; font-size: 13px; font-weight: 700;
  color: #1c1917; cursor: pointer; transition: border-color 0.15s;
  white-space: nowrap; min-width: 0; max-width: 220px;
}
.city-btn:hover { border-color: #0d9488; }
.city-chevron { font-size: 10px; color: #a8a29e; flex-shrink: 0; transition: transform 0.15s; }
.city-chevron.open { transform: rotate(180deg); }
.city-dropdown-wrap { position: relative; }
.city-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: #fff; border: 1px solid #e2ded7; border-radius: 14px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); min-width: 220px; max-width: 280px;
  z-index: 100; overflow: hidden;
}
.city-search {
  width: 100%; border: none; border-bottom: 1px solid #f3f1ed;
  padding: 10px 14px; font-family: inherit; font-size: 13px;
  outline: none; background: #fafaf8; color: #1c1917;
}
.city-list { max-height: 280px; overflow-y: auto; padding: 4px; }
.city-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  font-size: 13px; color: #1c1917; transition: background 0.1s;
  font-weight: 500;
}
.city-item:hover { background: #f0fdfa; }
.city-item.active { background: #0d9488; color: #fff; font-weight: 700; }
.city-item-country { font-size: 11px; opacity: 0.5; }

/* ── Year pills ──────────────────────────── */
.year-pill {
  padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600;
  border: none; cursor: pointer; transition: all 0.15s; font-family: inherit;
  white-space: nowrap; flex-shrink: 0;
}
.year-pill.active   { background: #0d9488; color: #fff; }
.year-pill.past     { background: transparent; color: #a8a29e; }
.year-pill.future   { background: transparent; color: #a8a29e; }
.year-pill.current  { background: transparent; color: #a8a29e; }
.year-pill:hover:not(.active) { background: #f0fdfa; color: #0d9488; }
.year-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #c4bfb8; white-space: nowrap; padding: 0 4px; }

/* ── Hero ────────────────────────────────── */
.hero-head { margin-bottom: 16px; }
.hero-eyebrow { font-size: 11px; font-weight: 700; color: #0d9488; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
.hero-title { font-size: clamp(30px, 5vw, 56px); font-weight: 800; letter-spacing: -1.5px; line-height: 1; color: #1c1917; }
.hero-sub { margin-top: 6px; font-size: 13px; color: #a8a29e; }
.hero-card {
  border-radius: 14px; padding: 12px 14px; text-align: left; cursor: pointer;
  border: 1.5px solid; transition: box-shadow 0.18s, transform 0.18s;
  font-family: inherit; width: 152px; flex-shrink: 0;
}
.hero-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.10); transform: translateY(-1px); }
.hero-card-rank { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 99px; margin-bottom: 8px; }
.hero-card-emoji { font-size: 20px; }
.hero-card-month { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-top: 4px; }
.hero-card-verdict { font-size: 12px; font-weight: 700; margin-top: 3px; }
.hero-card-meta { font-size: 11px; margin-top: 6px; line-height: 1.6; opacity: 0.7; }
.hero-card-warning { font-size: 10px; font-weight: 600; margin-top: 3px; }
.skip-strip { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.skip-chip { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }

/* ── Browse section ──────────────────────── */
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
/* teal left-bar accent on section titles */
.section-title {
  font-size: 15px; font-weight: 700; color: #1c1917;
  padding-left: 10px; border-left: 3px solid #0d9488;
}
.temp-toggle { display: flex; gap: 2px; }
.temp-btn { padding: 3px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.temp-btn.active { background: #0d9488; color: #fff; }
.temp-btn:not(.active) { background: transparent; color: #a8a29e; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a8a29e; }
.legend-dot { width: 9px; height: 9px; border-radius: 3px; }

/* ── Month grid ──────────────────────────── */
.month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.month-card {
  background: #fff;
  /* left accent bar in tier colour, set via inline style border-left */
  border-top: 1px solid #ede9e3;
  border-right: 1px solid #ede9e3;
  border-bottom: 1px solid #ede9e3;
  border-left: 3px solid transparent; /* overridden inline */
  border-radius: 11px;
  padding: 11px 12px 11px 10px;
  text-align: left; cursor: pointer;
  font-family: inherit;
  transition: box-shadow 0.15s, border-color 0.15s;
  outline: none; width: 100%;
  display: flex; flex-direction: column;
}
.month-card:hover:not(.selected) { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.month-card.selected { border-top-width: 1.5px; border-right-width: 1.5px; border-bottom-width: 1.5px; }
.mc-top { display: flex; justify-content: space-between; align-items: flex-start; min-height: 20px; }
.mc-name { font-size: 12px; font-weight: 600; color: #78716c; }  /* subdued — verdict is hero */
.mc-emoji { font-size: 14px; flex-shrink: 0; }
/* Verdict is now the dominant element */
.mc-verdict-row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.mc-verdict-text { font-size: 14px; font-weight: 800; letter-spacing: -0.2px; }   /* big + bold */
.mc-verdict-emoji { font-size: 13px; }
.mc-meta { margin-top: 5px; font-size: 11px; color: #a8a29e; line-height: 1.5; min-height: 34px; }
.mc-crowd-bad { color: #dc2626 !important; font-weight: 600; }
.mc-footer { margin-top: 5px; min-height: 22px; display: flex; flex-direction: column; gap: 3px; }
.mc-warning { font-size: 10px; font-weight: 600; }
/* remove old badge — replaced by mc-verdict-row */
.mc-badge { display: none; }

/* ── Detail panel (redesigned) ───────────── */
.detail-panel { background: #fff; border: 1.5px solid #ede9e3; border-radius: 18px; margin-top: 10px; overflow: hidden; }

/* Header: full-width — verdict + big score side by side */
.detail-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px; border-bottom: 1px solid #f3f1ed;
}
.detail-header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
.detail-emoji { font-size: 32px; flex-shrink: 0; }
.detail-month-name { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
.detail-badges { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.detail-verdict-badge { font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 99px; color: #fff; }
.detail-warning { font-size: 11px; font-weight: 600; }
/* Big score on the right of header */
.detail-score-block { text-align: right; flex-shrink: 0; padding-left: 20px; }
.detail-score-num { font-size: 52px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
.detail-score-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.5; margin-top: 2px; }
.close-btn { background: none; border: none; cursor: pointer; padding: 6px; color: #a8a29e; font-size: 16px; border-radius: 8px; line-height: 1; transition: color 0.15s; margin-left: 12px; flex-shrink: 0; }
.close-btn:hover { color: #1c1917; }

/* Two-column body: weather | crowds+cost */
.detail-body { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #f3f1ed; }
.detail-col { padding: 18px 22px; border-right: 1px solid #f3f1ed; }
.detail-col:last-child { border-right: none; }
/* Full-width events row */
.detail-events { padding: 18px 22px; }

.col-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #0d9488; margin-bottom: 12px; }
.weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.weather-tile { background: #f8f7f5; border-radius: 9px; padding: 9px 10px; }
.weather-tile-full { grid-column: 1 / -1; }
.weather-tile-warn { background: #fee2e2; }
.wt-label { font-size: 10px; color: #a8a29e; margin-bottom: 2px; }
.wt-value { font-size: 14px; font-weight: 700; color: #1c1917; }
.wt-value-warn { color: #dc2626; }
.bar-row { margin-bottom: 14px; }
.bar-label-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
.bar-label { font-size: 12px; font-weight: 600; color: #1c1917; }
.bar-value { font-size: 12px; font-weight: 700; }
.bar-track { height: 7px; background: #f3f1ed; border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
.bar-ends { display: flex; justify-content: space-between; margin-top: 3px; font-size: 10px; color: #c4bfb8; }
.holiday-item { display: flex; gap: 10px; padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; border: 1px solid; }
.holiday-icon { font-size: 15px; flex-shrink: 0; }
.holiday-body { flex: 1; min-width: 0; }
.holiday-name { font-size: 12px; font-weight: 700; color: #1c1917; line-height: 1.3; }
.holiday-dates { font-size: 11px; color: #78716c; margin-top: 3px; }
.holiday-impact { font-size: 10px; margin-top: 3px; color: #78716c; }
.no-holiday { padding: 10px 12px; border-radius: 10px; font-size: 12px; }
.quick-take { font-size: 13px; color: #57534e; line-height: 1.8; }

/* ── Divider ─────────────────────────────── */
.divider { height: 1px; background: #e2ded7; margin: 28px 0; }

/* ── Tweaks ──────────────────────────────── */
.tweaks-panel {
  position: fixed; bottom: 20px; right: 20px; z-index: 200;
  background: #fff; border: 1px solid #e2ded7; border-radius: 16px;
  padding: 18px 20px; width: 250px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12); font-family: inherit;
}
.tweaks-title { font-weight: 700; font-size: 13px; color: #1c1917; margin-bottom: 14px; }
.tweak-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.tweak-label { font-size: 12px; color: #57534e; }

/* ── Responsive ──────────────────────────── */
@media (max-width: 900px) {
  .month-grid { grid-template-columns: repeat(4, 1fr); }
  .detail-body { grid-template-columns: 1fr; }
  .detail-body .detail-col { border-right: none; border-bottom: 1px solid #f3f1ed; }
  .detail-events > div { grid-template-columns: 1fr !important; }
}
@media (max-width: 640px) {
  .main-wrap { padding: 20px 12px 80px; }
  .nav-row1 { height: 48px; gap: 8px; }
  .hero-title { letter-spacing: -1px; }
  .hero-card { width: 130px !important; padding: 10px 12px !important; }
  .hero-card-month { font-size: 16px !important; }
  .hero-card-emoji { font-size: 16px !important; }
  .month-grid { grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .month-card { padding: 10px 10px 10px 8px; }
  .mc-name { font-size: 11px; }
  .mc-verdict-text { font-size: 12px; }
  .mc-meta { font-size: 10px; }
  .detail-header { padding: 14px 16px; flex-wrap: wrap; gap: 8px; }
  .detail-score-num { font-size: 36px !important; }
  .detail-body { grid-template-columns: 1fr; }
  .detail-body .detail-col { border-right: none; border-bottom: 1px solid #f3f1ed; padding: 14px 16px; }
  .detail-events { padding: 14px 16px; }
  .detail-events > div { grid-template-columns: 1fr !important; }
  .weather-grid { gap: 5px; }
  .city-btn { max-width: 140px; font-size: 12px; }
  .skip-strip { flex-wrap: wrap; }
  .detail-month-name { font-size: 20px; }
  .detail-emoji { font-size: 24px; }
}
@media (max-width: 400px) {
  .month-grid { grid-template-columns: repeat(2, 1fr); }
  .hero-card-scroll-item { width: 140px; }
}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"showNumbers": false, "tempUnit": "C"}/*EDITMODE-END*/;

// ─── Verdict tier colours — MMORPG rarity style ─────────────────────────────
// red · orange · green · blue · purple
const TIERS = {
  5: { label:"Perfect", emoji:"✨", badge:"#7c3aed", bg:"#ede9fe", border:"#c4b5fd", text:"#4c1d95" },
  4: { label:"Great",   emoji:"👌", badge:"#2563eb", bg:"#dbeafe", border:"#93c5fd", text:"#1e3a8a" },
  3: { label:"Good",    emoji:"🙂", badge:"#16a34a", bg:"#dcfce7", border:"#86efac", text:"#14532d" },
  2: { label:"OK",      emoji:"😐", badge:"#ea580c", bg:"#ffedd5", border:"#fdba74", text:"#9a3412" },
  1: { label:"Avoid",   emoji:"🌧", badge:"#dc2626", bg:"#fee2e2", border:"#fca5a5", text:"#991b1b" },
};

function verdict(overall, typhoon) {
  let tier = overall >= 8.5 ? 5 : overall >= 7.0 ? 4 : overall >= 5.5 ? 3 : overall >= 4.0 ? 2 : 1;
  const t = { ...TIERS[tier], tier };
  if (typhoon === "high")     t.warning = "⚠️ Typhoon risk";
  else if (typhoon === "moderate") t.warning = "⛈ Storm season";
  return t;
}

// ─── Holiday impact helpers ──────────────────────────────────────────────────
const IMPACT_RANK   = { extreme:5, very_high:4, high:3, moderate:2, low:1 };
const IMPACT_LABEL  = { extreme:"Extreme", very_high:"V.High", high:"High", moderate:"Mod", low:"Low" };
const IMPACT_COLORS = { extreme:"#dc2626", very_high:"#ea580c", high:"#d97706", moderate:"#a16207", low:"#16a34a" };
const IMPACT_BG     = { extreme:"#fee2e2",  very_high:"#ffedd5",  high:"#fef3c7",  moderate:"#fefce8",  low:"#dcfce7" };

function crowdLabel(idx) {
  return idx <= 2 ? "Quiet" : idx <= 4 ? "Moderate" : idx <= 6.5 ? "Busy" : idx <= 8.5 ? "Very busy" : "Packed";
}
function crowdColor(idx) {
  return idx > 8 ? "#dc2626" : idx > 6.5 ? "#ea580c" : idx > 4 ? "#ca8a04" : "#059669";
}
function weatherEmoji(m) {
  if (m.typhoon === "high" || m.typhoon === "moderate") return "⛈";
  if (m.rainDays >= 16) return "🌧";
  if (m.rainDays >= 10) return "🌤";
  if (m.high >= 33) return "🌞";
  return "☀️";
}
function fmtTemp(c, unit) {
  return unit === "F" ? Math.round(c * 9/5 + 32) + "°F" : c + "°C";
}
function fmtDateRange(start, end, days) {
  const fmt = iso => {
    const [,mm,dd] = iso.split("-");
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return `${months[+mm-1]} ${+dd}`;
  };
  if (!end || start === end) return `${fmt(start)} · 1 day`;
  return `${fmt(start)} – ${fmt(end)} · ${days} day${days !== 1 ? "s" : ""}`;
}

// ─── City data ───────────────────────────────────────────────────────────────
const HK_MONTHS = [
  { m:1,  name:"Jan", high:18, low:13, humidity:72, rainDays:6,  rainfall:33,  feels:16, typhoon:"none",     overall:7.2, comfort:10, crowds:6.9, priceIdx:95,
    holidays:[{ name:"Lunar New Year", dateStart:"2027-01-28", dateEnd:"2027-02-03", days:7, crowdImpact:"very_high", priceImpact:"high", closureImpact:"significant" }] },
  { m:2,  name:"Feb", high:17, low:13, humidity:80, rainDays:9,  rainfall:48,  feels:15, typhoon:"none",     overall:5.6, comfort:9,  crowds:9.4, priceIdx:110,
    holidays:[{ name:"Lunar New Year peak", dateStart:"2027-02-01", dateEnd:"2027-02-07", days:7, crowdImpact:"extreme", priceImpact:"high", closureImpact:"significant" }] },
  { m:3,  name:"Mar", high:20, low:16, humidity:82, rainDays:11, rainfall:68,  feels:19, typhoon:"none",     overall:6.4, comfort:9,  crowds:8.6, priceIdx:98,  holidays:[] },
  { m:4,  name:"Apr", high:24, low:20, humidity:84, rainDays:12, rainfall:148, feels:24, typhoon:"none",     overall:6.4, comfort:9,  crowds:8.9, priceIdx:97,
    holidays:[{ name:"Easter", dateStart:"2027-04-02", dateEnd:"2027-04-05", days:4, crowdImpact:"high", priceImpact:"moderate", closureImpact:"minimal" }] },
  { m:5,  name:"May", high:28, low:24, humidity:83, rainDays:16, rainfall:292, feels:30, typhoon:"low",      overall:4.2, comfort:4,  crowds:9.4, priceIdx:92,  holidays:[] },
  { m:6,  name:"Jun", high:30, low:26, humidity:83, rainDays:19, rainfall:394, feels:33, typhoon:"moderate", overall:3.6, comfort:3,  crowds:10,  priceIdx:88,
    holidays:[{ name:"Dragon Boat Festival", dateStart:"2027-06-09", dateEnd:"2027-06-09", days:1, crowdImpact:"moderate", priceImpact:"low", closureImpact:"none" }] },
  { m:7,  name:"Jul", high:31, low:27, humidity:83, rainDays:17, rainfall:385, feels:34, typhoon:"moderate", overall:3.6, comfort:3,  crowds:10,  priceIdx:87,  holidays:[] },
  { m:8,  name:"Aug", high:31, low:27, humidity:82, rainDays:17, rainfall:367, feels:34, typhoon:"high",     overall:5.5, comfort:4,  crowds:5.2, priceIdx:86,  holidays:[] },
  { m:9,  name:"Sep", high:29, low:25, humidity:79, rainDays:15, rainfall:257, feels:31, typhoon:"high",     overall:7.6, comfort:10, crowds:1.0, priceIdx:89,  holidays:[] },
  { m:10, name:"Oct", high:26, low:22, humidity:72, rainDays:8,  rainfall:100, feels:26, typhoon:"moderate", overall:6.1, comfort:6,  crowds:5.8, priceIdx:102,
    holidays:[{ name:"National Day Golden Week", dateStart:"2027-10-01", dateEnd:"2027-10-07", days:7, crowdImpact:"very_high", priceImpact:"high", closureImpact:"minimal" }] },
  { m:11, name:"Nov", high:22, low:17, humidity:65, rainDays:6,  rainfall:36,  feels:21, typhoon:"none",     overall:9.3, comfort:10, crowds:2.7, priceIdx:105, holidays:[] },

// Generate plausible stub data for additional cities
function makeMonths(profile) {
  const { best, worst, typhoon: tyMap, highs, lows, crowds } = profile;
  const NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return NAMES.map((name, i) => {
    const m = i + 1;
    const isBest  = best.includes(m);
    const isWorst = worst.includes(m);
    const overall = isBest  ? +(6.8 + Math.random() * 2.2).toFixed(1)
                  : isWorst ? +(2.5 + Math.random() * 1.8).toFixed(1)
                  : +(4.5 + Math.random() * 2.0).toFixed(1);
    const rainDays = isWorst ? 12 + Math.floor(Math.random() * 10) : isBest ? 2 + Math.floor(Math.random() * 6) : 6 + Math.floor(Math.random() * 8);
    return {
      m, name, high: highs[i], low: lows[i], humidity: 70 + Math.floor(Math.random() * 20),
      rainDays, rainfall: rainDays * (8 + Math.floor(Math.random() * 12)),
      feels: highs[i] - 2 + Math.floor(Math.random() * 5),
      typhoon: tyMap[i] || "none",
      overall: Math.min(9.9, overall),
      comfort: Math.min(10, Math.round(isBest ? 8 + Math.random() * 2 : isWorst ? 1 + Math.random() * 4 : 4 + Math.random() * 4)),
      crowds: crowds[i],
      priceIdx: 85 + Math.floor(Math.random() * 40),
      holidays: [],
    };
  });
}

// ─── City Dropdown ─────────────────────────────────────────────────────────
function CityDropdown({ selected, onSelect }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const ref = useRef(null);
  const inputRef = useRef(null);
  const cityData = CITIES[selected];

  useEffect(() => {
    function onClick(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener("mousedown", onClick);
    return () => document.removeEventListener("mousedown", onClick);
  }, []);

  useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 50); }, [open]);

  const filtered = useMemo(() => {
    const q = query.toLowerCase();
    return Object.entries(CITIES).filter(([, d]) => d.city.toLowerCase().includes(q) || d.country.toLowerCase().includes(q));
  }, [query]);

  return (
    <div className="city-dropdown-wrap" ref={ref}>
      <button className="city-btn" onClick={() => { setOpen(o => !o); setQuery(""); }}>
        <span style={{ overflow: "hidden", textOverflow: "ellipsis" }}>{cityData.city}</span>
        <span className={`city-chevron ${open ? "open" : ""}`}>▾</span>
      </button>
      {open && (
        <div className="city-dropdown fade-up">
          <input ref={inputRef} className="city-search" placeholder="Search cities…" value={query} onChange={e => setQuery(e.target.value)} />
          <div className="city-list">
            {filtered.map(([slug, d]) => (
              <div key={slug} className={`city-item ${selected === slug ? "active" : ""}`}
                onClick={() => { onSelect(slug); setOpen(false); setQuery(""); }}>
                <span>{d.city}</span>
                <span className="city-item-country">{d.country}</span>
              </div>
            ))}
            {filtered.length === 0 && <div style={{ padding: "12px 10px", fontSize: 12, color: "#a8a29e" }}>No cities found</div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Best window detector ────────────────────────────────────────────────────
function getBestWindow(months) {
  const top3 = [...months].sort((a, b) => b.overall - a.overall).slice(0, 3).map(m => m.m).sort((a, b) => a - b);
  const NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  // Check consecutive pairs (with Dec→Jan wrap)
  function isConsec(a, b) { return b - a === 1 || (a === 12 && b === 1); }
  // Try all 3-month windows
  const all3Consec = isConsec(top3[0], top3[1]) && isConsec(top3[1], top3[2]);
  if (all3Consec) return `${NAMES[top3[0]-1]}–${NAMES[top3[2]-1]}`;
  // Try Dec-Jan wrap: e.g. [1, 11, 12]
  if (top3[0]===1 && top3[1]===11 && top3[2]===12) return "Nov–Jan";
  if (top3[0]===1 && top3[2]===12 && isConsec(top3[0], top3[1]-11)) return null; // skip ambiguous
  // Any 2 consecutive
  for (let i = 0; i < top3.length - 1; i++) {
    if (isConsec(top3[i], top3[i+1])) return `${NAMES[top3[i]-1]}–${NAMES[top3[i+1]-1]}`;
  }
  if (isConsec(top3[top3.length-1], top3[0] + 12)) return `${NAMES[top3[top3.length-1]-1]}–${NAMES[top3[0]-1]}`;
  return null;
}

// ─── Holiday Impact Tags ─────────────────────────────────────────────────────
function HolidayTags({ holidays }) {
  if (!holidays || holidays.length === 0) return null;
  // Sort by impact severity, show up to 2 tags
  const sorted = [...holidays].sort((a, b) => (IMPACT_RANK[b.crowdImpact] || 0) - (IMPACT_RANK[a.crowdImpact] || 0));
  const visible = sorted.slice(0, 2);
  const extra = sorted.length - visible.length;
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginTop: 5 }}>
      {visible.map((h, i) => (
        <span key={i} style={{
          fontSize: 9, fontWeight: 700, padding: "1px 5px", borderRadius: 99,
          background: IMPACT_BG[h.crowdImpact] || "#f3f1ed",

      {/* Verdict — PRIMARY element, large + bold */}
      <div className="mc-verdict-row">
        <span className="mc-verdict-text" style={{ color: v.badge }}>{v.label}</span>
        <span className="mc-verdict-emoji">{v.emoji}</span>
        {showNumbers && <span style={{ fontSize:11, color:"#a8a29e", fontWeight:600 }}>{month.overall.toFixed(1)}</span>}
      </div>

      {/* Secondary: temp + crowds */}
      <div className="mc-meta">
        <div>{fmtTemp(month.high, tempUnit)}/{fmtTemp(month.low, tempUnit)}</div>
        <div className={isCrowded ? "mc-crowd-bad" : ""}>{crowdLabel(month.crowds)}</div>
      </div>

      {/* Footer: warnings + holiday tags */}
      <div className="mc-footer">
        {v.warning && <div className="mc-warning" style={{ color: TIERS[1].text }}>{v.warning}</div>}
        <HolidayTags holidays={month.holidays} />
      </div>
    </button>
  );
}

// ─── Detail Panel ────────────────────────────────────────────────────────────
function DetailPanel({ month, cityData, planningYear, tempUnit, onClose }) {
  const v = verdict(month.overall, month.typhoon);
  const priceDelta = month.priceIdx ? Math.round(month.priceIdx - 100) : null;
  const priceLabel = priceDelta === null ? "No data" : priceDelta === 0 ? "Average" : priceDelta > 0 ? `+${priceDelta}% vs avg` : `${priceDelta}% vs avg`;
  const priceCol = priceDelta === null ? "#a8a29e" : priceDelta > 10 ? "#dc2626" : priceDelta < -5 ? "#059669" : "#78716c";
  const cCol = crowdColor(month.crowds);

  const quickTake = useMemo(() => {
    const parts = [];
    if (v.tier === 5) parts.push(`${month.name} is as good as it gets.`);
    else if (v.tier === 4) parts.push(`${month.name} is a solid choice.`);
    else if (v.tier === 3) parts.push(`${month.name} is decent with some trade-offs.`);
    else if (v.tier === 2) parts.push(`${month.name} has real drawbacks to consider.`);
    else parts.push(`${month.name} is best skipped if you can.`);
    if (month.rainDays <= 6) parts.push("Expect mostly sunny days.");
    else if (month.rainDays >= 16) parts.push(`${month.rainDays} rainy days — pack an umbrella.`);
    if (month.crowds <= 3) parts.push("You'll have it largely to yourself.");
    else if (month.crowds >= 9) parts.push("Expect big crowds — book well ahead.");
    if (month.typhoon === "high") parts.push("Typhoon risk is real — travel insurance is essential.");
    else if (month.typhoon === "moderate") parts.push("Storm season — check forecasts before you go.");
    if (month.holidays.length > 0) parts.push("Major holidays mean higher prices and crowds.");
    return parts.join(" ");
  }, [month]);

  return (
    <div className="detail-panel fade-up">
      {/* ── Header: emoji + month/verdict left, big score right ── */}
      <div className="detail-header" style={{ background: v.bg, borderBottomColor: v.border }}>
        <div className="detail-header-left">
          <span className="detail-emoji">{weatherEmoji(month)}</span>
          <div>
            <div className="detail-month-name" style={{ color: v.text }}>{month.name} {planningYear}</div>
            <div className="detail-badges">
              <span className="detail-verdict-badge" style={{ background: v.badge }}>{v.label} {v.emoji}</span>
              {v.warning && <span className="detail-warning" style={{ color: v.text }}>{v.warning}</span>}
            </div>
          </div>
        </div>
        <div className="detail-score-block">
          <div className="detail-score-num" style={{ color: v.text }}>{month.overall.toFixed(1)}</div>
          <div className="detail-score-label" style={{ color: v.text }}>out of 10</div>
        </div>
        <button className="close-btn" onClick={onClose}>✕</button>
      </div>

      {/* ── Two-column body: weather | crowds+cost ── */}
      <div className="detail-body">
        {/* Col 1: Weather */}
        <div className="detail-col">
          <div className="col-title">Weather</div>
          <div className="weather-grid">
            {[
              ["High",       fmtTemp(month.high,   tempUnit)],
              ["Low",        fmtTemp(month.low,    tempUnit)],
              ["Feels like", fmtTemp(month.feels,  tempUnit)],
              ["Humidity",   `${month.humidity}%`],
              ["Rain days",  `${month.rainDays} days`],
              ["Rainfall",   `${month.rainfall}mm`],
            ].map(([lbl, val]) => (
              <div key={lbl} className="weather-tile">
                <div className="wt-label">{lbl}</div>
                <div className="wt-value">{val}</div>
              </div>
            ))}
            {month.typhoon !== "none" && (
              <div className="weather-tile weather-tile-full weather-tile-warn">
                <div className="wt-label">Typhoon risk</div>
                <div className="wt-value wt-value-warn" style={{ textTransform:"capitalize" }}>{month.typhoon}</div>
              </div>
            )}
          </div>
        </div>

        {/* Col 2: Crowds & cost */}
        <div className="detail-col">
          <div className="col-title">Crowds & Cost</div>
          <div className="bar-row">
            <div className="bar-label-row">
              <span className="bar-label">Crowd level</span>
              <span className="bar-value" style={{ color: cCol }}>{crowdLabel(month.crowds)}</span>
            </div>
            <div className="bar-track"><div className="bar-fill" style={{ width:`${month.crowds*10}%`, background:cCol }} /></div>
            <div className="bar-ends"><span>Empty</span><span>Packed</span></div>
          </div>
          <div className="bar-row">
            <div className="bar-label-row">
              <span className="bar-label">Comfort</span>
              <span className="bar-value" style={{ color: month.comfort>=8?"#059669":month.comfort>=5?"#ca8a04":"#dc2626" }}>{month.comfort}/10</span>
            </div>
            <div className="bar-track"><div className="bar-fill" style={{ width:`${month.comfort*10}%`, background:month.comfort>=8?"#059669":month.comfort>=5?"#ca8a04":"#dc2626" }} /></div>
          </div>
          {priceDelta !== null && (
            <div className="bar-row">
              <div className="bar-label-row">
                <span className="bar-label">Hotel prices</span>
                <span className="bar-value" style={{ color:priceCol }}>{priceLabel}</span>
              </div>
              <div className="bar-track"><div className="bar-fill" style={{ width:`${Math.min(100,month.priceIdx)}%`, background:priceDelta>10?"#dc2626":priceDelta<-5?"#059669":"#ca8a04" }} /></div>
              <div className="bar-ends"><span>Cheap</span><span>Pricey</span></div>
            </div>
          )}
        </div>
      </div>

      {/* ── Full-width events + quick take ── */}
      <div className="detail-events">
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
          <div>
            <div className="col-title">Events {planningYear}</div>
            {month.holidays.length === 0 && cityData && !cityData.months.some(m => m.holidays.length > 0) ? (
              <div style={{ padding:"10px 12px", background:"#f8f7f5", border:"1px solid #e2ded7", borderRadius:10 }}>
                <span style={{ fontSize:12, color:"#a8a29e" }}>📋 Holiday data coming soon for this city</span>
              </div>
            ) : month.holidays.length === 0 ? (
              <div className="no-holiday" style={{ background:"#f0fdf4", border:"1px solid #bbf7d0" }}>
                <span style={{ fontSize:13, color:"#166534" }}>✅ No major events — smooth travel</span>
              </div>
            ) : month.holidays.map((h, i) => {
              const impactColor = IMPACT_COLORS[h.crowdImpact] || "#78716c";
              return (
                <div key={i} className="holiday-item" style={{ background:"#fffbeb", borderColor:"#fcd34d" }}>
                  <span className="holiday-icon">📅</span>
                  <div className="holiday-body">
                    <div className="holiday-name">{h.name}</div>
                    <div className="holiday-dates">{fmtDateRange(h.dateStart, h.dateEnd, h.days)}</div>
                    <div className="holiday-impact">
                      <span style={{ color:impactColor, fontWeight:700 }}>{h.crowdImpact.replace("_"," ")} crowds</span>
                      {h.priceImpact !== "none" && <span style={{ color:"#78716c" }}> · {h.priceImpact} prices</span>}
                      {h.closureImpact !== "none" && <span style={{ color:"#78716c" }}> · {h.closureImpact} closures</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div>
            <div className="col-title">Quick take</div>
            <p className="quick-take">{quickTake}</p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [selectedCity, setSelectedCity] = useState("hong-kong");
  const [planningYear, setPlanningYear] = useState(CURRENT_YEAR + 1);
  const [selectedMonth, setSelectedMonth] = useState(null);
  const detailRef = useRef(null);

  const cityData = CITIES[selectedCity];

  useEffect(() => {
    window.addEventListener("message", e => {
      if (e.data?.type === "__activate_edit_mode")   setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    });
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
  }, []);

  function handleSelectMonth(m) { setSelectedMonth(prev => prev === m ? null : m); }
  function handleCityChange(slug) { setSelectedCity(slug); setSelectedMonth(null); }

  useEffect(() => {
    if (selectedMonth !== null && detailRef.current) {
      const el = detailRef.current;
      const y = el.getBoundingClientRect().top + window.scrollY - 70;
      window.scrollTo({ top: y, behavior: "smooth" });
    }
  }, [selectedMonth]);

  useEffect(() => { document.title = `offpeak — ${cityData.city}`; }, [cityData]);

  const tempUnit = tweaks.tempUnit;

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* Nav */}
      <nav className="nav">
        <div className="nav-inner">
          <div className="nav-row1">
            <span style={{ fontWeight: 800, fontSize: 15, letterSpacing: "-0.5px", color: "#0d9488", flexShrink: 0 }}>offpeak</span>
            <span style={{ fontSize: 9, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#0d9488", border: "1px solid #99f6e4", padding: "2px 6px", borderRadius: 99, flexShrink: 0 }}>beta</span>
            <span className="nav-tagline">· weather, crowds & prices</span>
            <div style={{ width: 1, height: 18, background: "#e2ded7", flexShrink: 0 }} />
            <CityDropdown selected={selectedCity} onSelect={handleCityChange} />
            <div className="nav-years">
              <YearSelector selected={planningYear} onSelect={setPlanningYear} />
            </div>
          </div>
          {/* Mobile-only year row */}
          <div className="nav-row2">
            <YearSelector selected={planningYear} onSelect={setPlanningYear} />
          </div>
        </div>
      </nav>

      {/* Main */}
      <main className="main-wrap">
        <BestHero cityData={cityData} onSelectMonth={handleSelectMonth} planningYear={planningYear} />

        <div className="divider" />

        <div className="section-head">
          <h2 className="section-title">All months</h2>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div className="temp-toggle">
              {["C","F"].map(u => (
                <button key={u} className={`temp-btn ${tempUnit === u ? "active" : ""}`}
                  onClick={() => setTweaks(t => ({ ...t, tempUnit: u }))}>°{u}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Legend */}
        <div className="legend">
          {[5,4,3,2,1].map(tier => (
            <div key={tier} className="legend-item">
              <div className="legend-dot" style={{ background: TIERS[tier].badge }} />
              {TIERS[tier].label}
            </div>
          ))}
        </div>

        {/* Month grid */}
        <div className="month-grid">
          {cityData.months.map(month => (
            <MonthCard key={month.m} month={month} isSelected={selectedMonth === month.m}
              onSelect={handleSelectMonth} showNumbers={tweaks.showNumbers} tempUnit={tempUnit} />
          ))}
        </div>

        {/* Detail panel */}
        {selectedMonth !== null && (
          <div ref={detailRef}>
            <DetailPanel
              month={cityData.months[selectedMonth - 1]}
              cityData={cityData}
              planningYear={planningYear}
              tempUnit={tempUnit}
              onClose={() => setSelectedMonth(null)}
            />
          </div>
        )}
      </main>

      {/* Tweaks */}
      {showTweaks && (
        <div className="tweaks-panel">
          <div className="tweaks-title">Tweaks</div>
          <div className="tweak-row">
            <span className="tweak-label">Show score numbers</span>
            <input type="checkbox" checked={tweaks.showNumbers}
              onChange={e => {
                const v = { ...tweaks, showNumbers: e.target.checked };
                setTweaks(v);
                window.parent.postMessage({ type: "__edit_mode_set_keys", edits: v }, "*");
              }} />
          </div>
          <div className="tweak-row">
            <span className="tweak-label">Temperature unit</span>
            <div style={{ display: "flex", gap: 4 }}>
              {["C","F"].map(u => (
                <button key={u} style={{ padding: "2px 8px", borderRadius: 6, fontSize: 11, fontWeight: 600, border: "1px solid #e2ded7", cursor: "pointer", background: tempUnit === u ? "#1c1917" : "#fff", color: tempUnit === u ? "#fff" : "#57534e", fontFamily: "inherit" }}
                  onClick={() => { const v = {...tweaks, tempUnit: u}; setTweaks(v); window.parent.postMessage({type:"__edit_mode_set_keys", edits: v}, "*"); }}>
                  °{u}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
